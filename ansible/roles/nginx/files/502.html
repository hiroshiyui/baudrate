<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baudrate — Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: #1d232a; color: #a6adba;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; color: #e0e0e0; margin-bottom: 0.5rem; }
    p { font-size: 1rem; margin-bottom: 1rem; }
    .hint { font-size: 0.875rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Baudrate is restarting</h1>
    <p>A new version is being deployed. This page will refresh automatically.</p>
    <p class="hint">Please wait a moment...</p>
  </div>
  <script>setTimeout(function(){ location.reload(); }, 5000);</script>
</body>
</html>
